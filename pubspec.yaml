name: online_exam
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.8.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
   # Code Generator (mainly used with cubit & retrofit)
  freezed: ^3.2.3
  # Annotations for the freezed code-generator. This package does nothing without freezed too.
  freezed_annotation: ^3.1.0
  # For dependency injection
  get_it: ^9.2.1
  # Classes and helper functions that support JSON code generation via the `json_serializable` package.
  json_annotation: ^4.9.0
  # A powerful HTTP networking package, supports Interceptors, Aborting and canceling a request, Custom adapters, Transformers, etc.
  dio: ^5.9.2
  # An dio client generator using source_gen and inspired by Chopper and Retrofit.
  retrofit: 4.9.0
  # Pretty Dio logger is a Dio interceptor that logs network calls in a pretty, easy to read format.
  pretty_dio_logger: ^1.4.0
  # For Splash Screen
  flutter_native_splash: ^2.4.7
  # An SVG rendering and widget library for Flutter, which allows painting and displaying Scalable Vector Graphics 1.1 files.
  flutter_svg: ^2.2.3
  # A flutter plugin for adapting screen and font size.Let your UI display a reasonable layout on different screen sizes!
  flutter_screenutil: ^5.9.3
  # A flutter library to show images from the internet and keep them in the cache directory.
  cached_network_image: ^3.4.1
  # Reading and writing simple key-value pairs
  shared_preferences: ^2.5.3
  # A Flutter plugin for securely storing sensitive data using encrypted storage.

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^5.0.0
  
  # Automatically generate code for converting to and from JSON by annotating Dart classes.
  json_serializable: ^6.11.2
  # A build system for Dart code generation and modular compilation.
  build_runner: ^2.15.0
  # Generator for retrofit API clients.
  retrofit_generator: ^10.2.0
# The following section is specific to Flutter packages.

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
